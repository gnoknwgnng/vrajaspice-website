<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 550" width="100%" height="100%">
    <!-- Metallic Gold Pouch Background -->
    <defs>
      <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#C2B548" />
        <stop offset="40%" stop-color="#A89B2D" />
        <stop offset="70%" stop-color="#8F8321" />
        <stop offset="100%" stop-color="#706616" />
      </linearGradient>
      <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#C7D56B" />
        <stop offset="100%" stop-color="#B8C65A" />
      </linearGradient>
      <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
        <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
      </filter>
    </defs>

    <!-- Pouch Body -->
    <rect x="15" y="15" width="370" height="520" rx="20" fill="url(#goldGrad)" />
    
    <!-- Heat Sealed Lines (Top) -->
    <line x1="30" y1="35" x2="370" y2="35" stroke="#706616" stroke-width="2" stroke-dasharray="3,3" />
    <line x1="30" y1="42" x2="370" y2="42" stroke="#706616" stroke-dasharray="3,3" />
    <line x1="30" y1="49" x2="370" y2="49" stroke="#706616" stroke-dasharray="3,3" />
    
    <!-- Zipper Line -->
    <line x1="30" y1="80" x2="370" y2="80" stroke="#706616" stroke-width="2" />
    <circle cx="50" cy="80" r="3" fill="#706616" />
    <circle cx="350" cy="80" r="3" fill="#706616" />

    <!-- Label Base -->
    <rect x="45" y="110" width="310" height="380" rx="10" fill="url(#labelGrad)" filter="url(#shadow)" />

    <!-- Indian Veg Square Symbol -->
    <rect x="310" y="125" width="20" height="20" fill="none" stroke="#25371F" stroke-width="2" />
    <circle cx="320" cy="135" r="5" fill="#25371F" />

    <!-- Brand Name (Logo Placeholder) -->
    <text x="200" y="170" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="900" fill="#25371F" letter-spacing="4" text-anchor="middle">VRAJASPICE</text>
    <text x="200" y="190" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="600" fill="#4E5A2D" letter-spacing="3" text-anchor="middle">ESTD. 2026</text>
    
    <!-- Divider Line -->
    <line x1="100" y1="215" x2="300" y2="215" stroke="#25371F" stroke-width="1.5" opacity="0.4" />

    <!-- Product Title (Category) -->
    <text x="200" y="270" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#25371F" text-anchor="middle">Ekadashi Fasting Mix</text>
    
    <!-- Subtitle -->
    <text x="200" y="300" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#4E5A2D" letter-spacing="1.5" text-anchor="middle">SATTVIK | NO ONION NO GARLIC</text>
    <text x="200" y="320" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-style="italic" fill="#4E5A2D" text-anchor="middle">Pure Vrat-Friendly Satvik Foods</text>

    <!-- Transparent Window (Stylized placeholder) -->
    <rect x="70" y="355" width="260" height="75" rx="8" fill="#F8F6EF" fill-opacity="0.15" stroke="#25371F" stroke-width="1" stroke-dasharray="4,4" />
    <text x="200" y="398" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#25371F" opacity="0.6" text-anchor="middle">[ Unique Image Coming Soon ]</text>

    <!-- Bottom Info -->
    <text x="200" y="465" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" font-weight="bold" fill="#25371F" letter-spacing="1" text-anchor="middle">100% PURE &amp; NATURAL</text>
    <text x="200" y="480" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="8" fill="#4E5A2D" letter-spacing="0.5" text-anchor="middle">NO PRESERVATIVES | NO ARTIFICIAL COLORS</text>
  </svg>